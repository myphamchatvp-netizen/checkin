<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Bản đồ Check-in KH</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Supabase -->
  <script src="./js/internal_key.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --border:#e5e7eb;
      --muted:#6b7280;
    }

    html,body{
      margin:0;
      padding:0;
      height:100%;
      overflow:hidden;
      font-family:system-ui,Segoe UI,Roboto,Arial;
    }

    #map{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
    }

    .leaflet-control-zoom{
      display:none !important;
    }

    .top-controls{
      position:fixed;
      top:10px;
      left:10px;
      right:10px;
      z-index:2000;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .row{
      display:flex;
      gap:8px;
      width:100%;
    }

    .row select,
    #searchBox{
      flex:1;
      padding:8px 12px;
      font-size:14px;
      border-radius:10px;
      border:1px solid #d0d7de;
      background:white;
    }

    #gpsBtn{
      width:40px;
      height:40px;
      min-width:40px;
      border-radius:50%;
      border:none;
      background:white;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.3);
      font-size:20px;
      cursor:pointer;
    }

    .mk-red{
      background:#ef4444;
      color:white;
      width:26px;
      height:26px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      border:2px solid white;
      font-weight:600;
      box-shadow:0 0 0 1px rgba(0,0,0,0.3),0 4px 8px rgba(0,0,0,0.2);
    }

    .mk-green{
      background:#22c55e;
      color:white;
      width:26px;
      height:26px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      border:2px solid white;
      font-weight:600;
      box-shadow:0 0 0 1px rgba(0,0,0,0.3),0 4px 8px rgba(0,0,0,0.2);
    }

    .leaflet-popup-content{
      min-width:240px;
    }

    .map-link{
      display:block;
      margin-top:10px;
      padding:9px 12px;
      background:#2563eb;
      color:white !important;
      border-radius:8px;
      text-align:center;
      text-decoration:none;
      font-weight:700;
    }

    .map-link:hover{
      background:#1d4ed8;
    }

    .map-link-small{
      display:block;
      margin-top:8px;
      color:#2563eb !important;
      text-align:center;
      text-decoration:none;
      font-weight:600;
      font-size:13px;
    }
  </style>
</head>

<body>

<div class="top-controls">
  <div class="row">
    <button id="gpsBtn">📍</button>

    <select id="colorFilter">
      <option value="">Tất cả</option>
      <option value="green">Xanh (có mua)</option>
      <option value="red">Đỏ (chưa mua)</option>
    </select>

    <select id="nvFilter">
      <option value="">Nhân viên</option>
    </select>
  </div>

  <input id="searchBox" type="text" placeholder="Tìm kiếm KH...">
</div>

<div id="map"></div>

<script>
(async function(){

  function esc(value){
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  // ================== KẾT NỐI SUPABASE ==================
  const supabase = window.supabase.createClient(
    window.getConfig("url"),
    window.getConfig("role") || window.getConfig("anon"),
    {
      global:{
        headers:{
          "x-internal-key": window.getInternalKey()
        }
      }
    }
  );

  // ================== TẠO MAP ==================
  const map = L.map("map", {
    zoomControl:false
  }).setView([20.85,106.68], 12);

  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{
    maxZoom:19
  }).addTo(map);

  // ================== LẤY KH ==================
  async function fetchAllRows() {
    const pageSize = 1000;
    let from = 0;
    let allRows = [];

    while (true) {
      const { data, error } = await supabase
        .from("nv_checkin_khach_hang")
        .select("lat,lng,ten_kh,ma_kh,dia_chi,dien_thoai,ma_nv,Da_mua_hang")
        .range(from, from + pageSize - 1);

      if (error) throw error;
      if (!data || data.length === 0) break;

      allRows = allRows.concat(data);

      if (data.length < pageSize) break;
      from += pageSize;
    }

    return allRows;
  }

  const data = await fetchAllRows();
  console.log("Tổng rows lấy được:", data.length);

  let points = [];
  let markers = [];

  data.forEach((r,i)=>{
    if(!r.lat || !r.lng) return;

    const lat = parseFloat(r.lat);
    const lng = parseFloat(r.lng);

    if(isNaN(lat) || isNaN(lng)) return;

    const stt = i + 1;
    const isGreen = r.Da_mua_hang ? true : false;

    const googleMapDir = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
    const googleMapView = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;

    const icon = L.divIcon({
      html:`<div class="${isGreen ? 'mk-green' : 'mk-red'}">${stt}</div>`,
      iconSize:[26,26],
      iconAnchor:[13,13]
    });

    const popupHtml = `
      <b>${esc(r.ten_kh || "Không tên")}</b><br>
      Mã KH: ${esc(r.ma_kh || "")}<br>
      Địa chỉ: ${esc(r.dia_chi || "")}<br>
      ĐT: ${esc(r.dien_thoai || "")}<br>
      NV: ${esc(r.ma_nv || "")}<br>
      Đã mua: <b>${r.Da_mua_hang ? "✔ Có" : "✘ Không"}</b>

      <a class="map-link" href="${googleMapDir}" target="_blank" rel="noopener">
        📍 Dẫn đường Google Map
      </a>

      <a class="map-link-small" href="${googleMapView}" target="_blank" rel="noopener">
        🔎 Xem trên Google Maps
      </a>
    `;

    const mk = L.marker([lat,lng], { icon }).bindPopup(popupHtml);

    mk.addTo(map);

    points.push({
      stt,
      lat,
      lng,
      marker:mk,
      color:isGreen ? "green" : "red",
      nv:r.ma_nv || "",
      row:r
    });

    markers.push(mk);
  });

  if(markers.length){
    const grp = L.featureGroup(markers);
    map.fitBounds(grp.getBounds(), {
      padding:[50,50]
    });
  }

  // ================== GPS ==================
  let userMarker = null;
  let userCircle = null;
  let lastLat = null;
  let lastLng = null;

  function showGPS(lat,lng){
    lastLat = lat;
    lastLng = lng;

    if(userMarker){
      userMarker.setLatLng([lat,lng]);
    } else {
      userMarker = L.circleMarker([lat,lng],{
        radius:8,
        color:"#b91c1c",
        fillColor:"#ef4444",
        fillOpacity:1,
        weight:3
      }).addTo(map);
    }

    if(userCircle){
      userCircle.setLatLng([lat,lng]);
    } else {
      userCircle = L.circle([lat,lng],{
        radius:100,
        color:"#f87171",
        fillColor:"#fecaca",
        fillOpacity:0.3,
        weight:1
      }).addTo(map);
    }
  }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos=>{
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        showGPS(lat,lng);
        map.setView([lat,lng],18);
      },
      err=>{
        console.warn("Không lấy được GPS:", err);
      },
      {
        enableHighAccuracy:true,
        timeout:5000,
        maximumAge:0
      }
    );

    navigator.geolocation.watchPosition(
      pos=>{
        showGPS(pos.coords.latitude, pos.coords.longitude);
      },
      err=>{
        console.warn("GPS watch lỗi:", err);
      },
      {
        enableHighAccuracy:true,
        timeout:5000,
        maximumAge:0
      }
    );
  }

  document.getElementById("gpsBtn").onclick = ()=>{
    if(lastLat && lastLng){
      map.setView([lastLat,lastLng],18);
    } else if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(pos=>{
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        showGPS(lat,lng);
        map.setView([lat,lng],18);
      });
    }
  };

  // ================== DROPDOWN LỌC NV ==================
  const nvFilter = document.getElementById("nvFilter");
  const nvSet = new Set();

  points.forEach(p=>{
    if(!p.nv) return;

    p.nv
      .split("_")
      .map(x=>x.trim())
      .filter(Boolean)
      .forEach(nv=>nvSet.add(nv));
  });

  [...nvSet].sort().forEach(nv=>{
    const opt = document.createElement("option");
    opt.value = nv;
    opt.textContent = nv;
    nvFilter.appendChild(opt);
  });

  // ================== LỌC MÀU + NHÂN VIÊN + TÌM KIẾM ==================
  const colorFilter = document.getElementById("colorFilter");
  const searchBox = document.getElementById("searchBox");

  function applyFilter(){
    const fColor = colorFilter.value;
    const fNV = nvFilter.value;
    const q = searchBox.value.trim().toLowerCase();

    points.forEach(p=>{
      const r = p.row;
      let ok = true;

      if(fColor && p.color !== fColor){
        ok = false;
      }

      if(fNV){
        const nvList = p.nv
          .split("_")
          .map(x=>x.trim())
          .filter(Boolean);

        if(!nvList.includes(fNV)){
          ok = false;
        }
      }

      if(q){
        const text = `
          ${r.ma_kh || ""}
          ${r.ten_kh || ""}
          ${r.dia_chi || ""}
          ${r.dien_thoai || ""}
          ${r.ghi_chu || ""}
          ${r.ghi_ghu || ""}
          ${r.ma_nv || ""}
        `.toLowerCase();

        if(!text.includes(q)){
          ok = false;
        }
      }

      if(ok){
        if(!map.hasLayer(p.marker)){
          p.marker.addTo(map);
        }
      } else {
        if(map.hasLayer(p.marker)){
          map.removeLayer(p.marker);
        }
      }
    });

    const remain = points.filter(p => map.hasLayer(p.marker));

    if(remain.length === 1){
      map.setView([remain[0].lat, remain[0].lng], 18);
      remain[0].marker.openPopup();
    }
  }

  colorFilter.onchange = applyFilter;
  nvFilter.onchange = applyFilter;
  searchBox.oninput = applyFilter;

})();
</script>

</body>
</html>
